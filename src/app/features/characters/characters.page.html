<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Characters</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Characters</ion-title>
    </ion-toolbar>
  </ion-header>

  @if (characters$ | async; as characters) {
    @for (character of characters; track character.id) {
      <app-card
        [title]="character.title"
        [subtitle]="character.subtitle"
        [content]="character.content"
        [age]="character.age"
        [firstAppearanceTitle]="character.firstAppearanceTitle"
        [firstAppearanceDate]="character.firstAppearanceDate"
        [image]="character.portraitPath | simpsonsImageUrl"
        [alt]="character.alt">
      </app-card>
    }
  } @else {
    <ion-toolbar>
      <ion-title>Loading characters...</ion-title>
    </ion-toolbar>
  }
</ion-content>
