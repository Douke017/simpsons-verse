<app-header title="Personajes"></app-header>

<ion-content [fullscreen]="true" class="characters-content-container">
  <main class="characters-main-layout max-w-container-max mx-auto pb-24">

    <!-- Search Section -->
    <section class="characters-search-section">
      <app-search-bar
        [value]="characterService.searchQuery()"
        (queryChange)="characterService.setSearchQuery($event)"
        placeholder="Busca personajes por nombre u ocupación...">
      </app-search-bar>
    </section>

    <!-- State Indicators -->
    @if (characterService.isLoading() && characterService.charactersList().length === 0) {
      <app-loading-spinner message="Cargando Springfield characters..."></app-loading-spinner>
    } @else if (characterService.error()) {
      <app-error-state [message]="characterService.error()!" (retry)="characterService.loadInitialPage()"></app-error-state>
    } @else {
      <!-- Native Ionic Grid for Responsive Layout scaling -->
      <ion-grid class="ion-no-padding">
        <ion-row>
          @for (character of characters(); track character.id) {
            <ion-col size="12" size-md="6" size-lg="4" class="ion-no-padding">
              <div class="card-grid-padding">
                <app-card
                  (click)="viewCharacterDetails(character.id)"
                  [title]="character.title"
                  [subtitle]="character.subtitle"
                  [content]="character.content"
                  [age]="character.age"
                  [birthdate]="character.birthdate"
                  [gender]="character.gender"
                  [occupation]="character.occupation"
                  [status]="character.status"
                  [image]="character.portraitPath | simpsonsImageUrl"
                  [alt]="character.alt">
                </app-card>
              </div>
            </ion-col>
          } @empty {
            <div class="empty-state-container">
              <p>No se encontraron personajes que coincidan con tu búsqueda.</p>
            </div>
          }
        </ion-row>
      </ion-grid>

      <!-- Pagination Component -->
      <app-pagination
        [currentPage]="characterService.currentPage()"
        [hasMore]="characterService.hasMore()"
        (pageChange)="characterService.goToPage($event)">
      </app-pagination>
    }
  </main>
</ion-content>
