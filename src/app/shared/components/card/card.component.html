<ion-card>
  <img [alt]="alt" [src]="image" />
  <ion-card-header>
    <ion-card-title>{{ title | upperCase }}</ion-card-title>
    <ion-card-subtitle>{{ subtitle | upperCase }}</ion-card-subtitle>
  </ion-card-header>


  <ion-card-content>
    <p>{{ content }}</p>
    <p>Edad: {{ age ?? 'Desconocida' }}</p>
    <p>
      Primera aparición:
      @if (firstAppearanceTitle) {
        <span>{{ firstAppearanceTitle | upperCase }}</span>
      } @else {
        <span>Sin dato</span>
      }
      @if (firstAppearanceDate) {
        <span> - {{ firstAppearanceDate | formatDate }}</span>
      }
    </p>
  </ion-card-content>
</ion-card>
